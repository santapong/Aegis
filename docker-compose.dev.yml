# Development overrides. Use together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# This enables hot-reload (uvicorn --reload, bun run dev) and mounts your
# working tree into the containers. Do NOT use this file alone.
services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: bun run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
